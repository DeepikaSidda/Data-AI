# Hand-encoded Job_Profile for "Senior AI Engineer — Founding Team at Redrob AI".
#
# Derived offline from job_description.md. This file is the committed, structured
# representation of the role used for scoring. It is loaded by
# ranking.job_profile.JobProfile.load() with NO network access.
#
# Requirements: 2.1, 2.2, 2.3, 2.4.

positive_signals:
