    - image segmentation
    - object detection
    - speech recognition
    - robotics
    - slam
    - control systems

location_pref:
  preferred_cities:
    - Noida
    - Pune
  # Also welcome (Tier-1 Indian metros).
  welcome_cities:
    - Hyderabad
    - Mumbai
    - Delhi
    - Delhi NCR
    - Gurgaon
    - Gurugram
    - Bengaluru
  relocation_ok: true
  india_required: false        # candidates outside India considered...
  outside_india_case_by_case: true  # ...on a case-by-case basis, no visa sponsorship

notice_pref:
  # Notice period under 30 days preferred; 30+ days raises the bar.
  preferred_max_days: 30
  raises_bar_at_days: 30

# Canonical single rich paragraph used to embed the role offline.
profile_text: >-
  Senior AI Engineer for the founding team at Redrob AI, a product company
  building candidate discovery and ranking. We need an engineer with 5 to 9
  years of experience who has shipped production embeddings-based retrieval,
  semantic search, recommendation, and ranking systems that real users depend
  on, and who has operated production vector database or hybrid search
  infrastructure such as Pinecone, Weaviate, Qdrant, Milvus, OpenSearch,
  Elasticsearch, or FAISS. Strong Python is the primary engineering language.
  The role demands rigorous evaluation of ranking quality using metrics like
  NDCG, MRR, and MAP, along with A/B testing, and a product-over-research
  attitude focused on shipping end-to-end search, ranking, and recommendation
  features at product companies. Nice to have: LLM fine-tuning with LoRA, QLoRA,
  or PEFT, learning-to-rank, HR-tech domain experience, distributed systems, and
  open-source contributions. Preferred location is Noida or Pune with relocation
  supported; Hyderabad, Mumbai, and Delhi NCR are welcome and candidates outside
  India are considered case-by-case with no visa sponsorship. A notice period
  under 30 days is preferred.
