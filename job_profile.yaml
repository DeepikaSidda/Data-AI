    - hybrid search infrastructure
    - vector database in production
    - evaluation framework for ranking
    - a/b testing for ranking
    - learning to rank
    - production machine learning at a product company
  # Concrete skill / tech terms that count as relevant trusted skills.
  skill_terms:
    - python
    - embeddings
    - retrieval
    - ranking
    - recommendation
    - recsys
    - semantic search
    - information retrieval
    - nlp
    - vector search
    - hybrid search
    - pinecone
