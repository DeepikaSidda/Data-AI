    - machine learning engineer
    - ml engineer
    - search engineer
    - applied scientist
    - software engineer
    - data scientist
    - research engineer
    - backend engineer
    - platform engineer
  # Evaluation-framework metrics the role explicitly values.
  eval_metrics:
