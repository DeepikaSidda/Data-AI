    - tata consultancy services
    - infosys
    - wipro
    - accenture
    - cognizant
    - capgemini
    - tech mahindra
    - hcl
    - mindtree
  # Other disqualifying / down-weighting patterns.
  flags:
    - pure research without production deployment
    - academic only no production
    - recent langchain openai only under 12 months
    - senior not coded in 18 months
    - title chasing job hopping every 1.5 years
    - computer vision only without nlp or ir
    - speech only without nlp or ir
    - robotics only without nlp or ir
    - closed source only 5 years no external validation
