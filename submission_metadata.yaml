# ============================================================================
# AI tools declaration
# ============================================================================
# Transparency only — declared use is NOT penalized. Stage 5 interview may verify
# these declarations against the code.
ai_tools_used:
  - "Kiro"      # AI development environment used for spec-driven implementation
  - "Claude"    # Architecture discussion, code review, and engineering assistance

ai_usage_summary: |
  AI tools (Kiro and Claude) were used for engineering assistance: spec-driven
  design, code generation, code review, and test scaffolding. No candidate data
  was sent to any hosted LLM at any point. The ranking pipeline itself uses a
  local sentence-transformers model (BAAI/bge-small-en-v1.5) and makes no network
  calls during ranking — all scoring, honeypot detection, and reasoning generation
  run fully offline on CPU.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Hybrid local ranker, fully offline and CPU-only. Candidate and job texts are
  embedded once with a local BGE model (BAAI/bge-small-en-v1.5); cosine similarity
  (via FAISS/numpy, mapped to [0,1]) gives the semantic dimension. Five normalized
  dimensions — semantic, title-aware skills, experience, trajectory, education —
  are combined as a weighted sum. A per-skill trust multiplier (proficiency ×
  duration × endorsement) plus a title-alignment weighting defeat keyword-stuffer
  traps, so expert/zero-duration skills contribute nothing. Experience uses a soft
  5–9 year band; trajectory rewards product/search/ranking work over services-only
  and penalizes title-chasing hops. A bounded behavioral modifier (recency,
  recruiter response, notice period, open-to-work from redrob_signals) adjusts but
  never dominates fit. Five consistency checks flag honeypots/impossible profiles
  and exclude them from the top 100, avoiding disqualification. Ranking is
  deterministic: sort by (-final_score, candidate_id), take top 100, with
  candidate_id tie-break. Reasoning is fact-grounded, generated offline from record
  facts only.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true        # We have read submission_spec.md in full
  code_is_original_work: true       # Our code is our team's original work (AI used as a tool)
  no_collusion: true                # We have not coordinated our submission with other teams
  honeypot_check_done: true         # We explicitly check for honeypots and exclude them from ranking
  reproduction_tested: true         # We have tested that reproduce_command runs end-to-end
