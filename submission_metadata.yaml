# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "TODO: e.g. MacBook Pro M2 / AWS EC2 c5.4xlarge / Local Linux box"  # TODO
  cpu_cores: 8                                  # TODO: number of CPU cores used
  ram_gb: 16                                    # TODO: available RAM in GB
  python_version: "3.11"                        # 3.10+ supported; this project targets 3.11
  os: "TODO: e.g. Ubuntu 22.04 LTS / macOS 14.2 / Windows 11"  # TODO
